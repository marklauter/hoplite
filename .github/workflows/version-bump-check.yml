name: version-bump-check

# Fail when a plugin is edited without bumping its version. The cache is keyed
# by version, so an unbumped edit never reaches installs. The guard reminds;
# the author/agent chooses the semver size. Also keeps the marketplace entry
# versions mirrored to each plugin.json.

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check plugin version bumps
        run: >
          python .github/scripts/check_version_bumps.py
          "${{ github.event.pull_request.base.sha || github.event.before }}"
          "${{ github.event.pull_request.head.sha || github.sha }}"
